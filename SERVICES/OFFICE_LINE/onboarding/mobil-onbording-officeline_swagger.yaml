x-transport-security:
  mTLS: true
  notes: Mutual TLS is required at the transport layer.
x-onboarding-state-machine:
  macroStates:
  - CREATED
  - PHONE_VERIFICATION
  - EMAIL_VERIFICATION
  - IDENTITY_CAPTURE
  - AML_DATA_COLLECTION
  - AML_SUBMITTED
  - DOCUMENTS
  - PRODUCT_SELECTION
  - CREDENTIALS_SETUP
  - BACKGROUND_PROCESSING
  - READY_FOR_TOKEN_ACTIVATION
  - COMPLETED
  - REJECTED
  - FAILED
  notes:
  - 'A lightweight status endpoint is exposed: GET /v1/onboarding/{processId}/status returns the current macro step. Backend still enforces order using 409 StepNotAllowed.'
  - PHONE_VERIFICATION and EMAIL_VERIFICATION allow repeated submission/resend within the same macro state until successful OTP verification.
  - Identity capture finalize returns decision + mined data; decision/mined-data polling endpoints are not used.
  - 'Identity capture: the identity attempt (init â†’ sample(s) â†’ finalize) may be repeated any number of times within IDENTITY_CAPTURE until the user confirms mined data via PUT /v1/onboarding/{processId}/identity/mined-data/confirmation.'
  - PRODUCT_SELECTION stores the user's selected products before credentials are set.
  - BACKGROUND_PROCESSING is commonly detected by polling GET /v1/onboarding/{processId}/status until it reports completion, after which the flow advances to READY_FOR_TOKEN_ACTIVATION.
  - READY_FOR_TOKEN_ACTIVATION is finalized via POST /v1/onboarding/{processId}/token/activate which returns activation data and completes the onboarding process.
x-error-codes:
- code: ONB_PROCESS_NOT_FOUND
  legacy: ERR_301
  httpStatus: 404
  message: Onboarding process not found
  lifecycle: active
  notes: When processId is unknown.
- code: ONB_OTP_ATTEMPTS_EXCEEDED
  legacy: ERR_302
  httpStatus: 429
  message: OTP attempts exceeded
  lifecycle: active
  notes: When the allowed number of OTP entry attempts is exceeded.
- code: ONB_OTP_COOLDOWN_ACTIVE
  legacy: ERR_303
  httpStatus: 429
  message: OTP cooldown active
  lifecycle: active
  notes: When OTP is requested during an active resend cooldown window (SMS only).
- code: ONB_INVALID_ONBOARDING_STEP
  legacy: ERR_305
  httpStatus: 409
  message: Invalid onboarding step
  lifecycle: active
  notes: Returned when onboarding step rules are violated.
- code: ONB_ENCRYPTION_KEY_NOT_FOUND
  legacy: ERR_307
  httpStatus: 500
  message: Encryption key not found
  lifecycle: active
  notes: Missing or unavailable encryption key on the server.
- code: ONB_DOCUMENT_NOT_FOUND
  legacy: ERR_308
  httpStatus: 404
  message: Onboarding document not found
  lifecycle: active
  notes: Unknown documentId.
- code: ONB_INVALID_FIELD
  httpStatus: 400
  message: Invalid field
  lifecycle: active
  notes: Invalid field; `field` specifies which. Not applied by all APIs for all fields.
- code: ONB_STEP_NOT_ALLOWED
  httpStatus: 409
  message: Step not allowed (forward-only flow)
  lifecycle: active
  notes: Returned when the required onboarding step sequence is not respected.
- code: ONB_PROCESS_EXPIRED
  httpStatus: 410
  message: Onboarding process expired
  lifecycle: active
  notes: The onboarding process has expired.
- code: ONB_PEP_NOT_ALLOWED
  httpStatus: 403
  message: PEP customers are not allowed
  lifecycle: active
  notes: Returned when the user declares they are a politically exposed person (PEP).
- code: ONBOARDING_DENIED
  httpStatus: 503
  message: Onboarding is currently disabled
  lifecycle: active
  notes: Onboarding APIs are disabled server-side (feature flag / maintenance).
- code: ONB_USER_ALREADY_EXISTS
  httpStatus: 409
  message: User already exists
  lifecycle: active
  notes: Returned when the submitted identifying data matches an existing user.
- code: ONB_FIELD_REQUIRED
  httpStatus: 400
  message: Field is required
  lifecycle: active
  notes: Returned when a required field is missing; field identifies which one.
- code: ONB_COUNTRY_UNSUPPORTED
  httpStatus: 400
  message: Country currently not supported
  lifecycle: active
  notes: Returned when the user declares they are not CZ or SK.

