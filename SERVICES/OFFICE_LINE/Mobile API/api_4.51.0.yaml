openapi: 3.0.1
info:
  title: PrivatBanka Mobile API
  version: 4.51.0
servers:
- url: https://ma-dev.privatbanka.sk/api
paths:
  /digipass/activation:
    post:
      tags:
      - activation
      summary: Initiate activation process
      description: Initiates the activation process of a new Digipass instance
      operationId: initiateActivation
      requestBody:
        description: Request parameters
        content:
          'application/json':
            schema:
              type: object
              properties:
                activationId:
                  type: string
                  description: Realm of the user activating the instance
        required: true
      responses:
        200:
          description: Activation process initiation response
          content:
            'application/json':
              schema:
                type: object
        400:
          description: error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: request
  /digipass/activation/{id}:
    get:
      tags:
      - activation
      summary: Get license activation data
      description: Retrieves license activation data during the activation process
        of a new Digipass instance
      operationId: requestActivationData
      parameters:
      - name: id
        in: path
        description: Activation process ID
        required: true
        schema:
          type: string
      - name: ephemeralKey
        in: query
        description: Client ephemeral public key
        required: true
        schema:
          type: string
      - name: evidence
        in: query
        description: Client evidence message
        required: true
        schema:
          type: string
      responses:
        200:
          description: License activation response
          content:
            'application/json':
              schema:
                type: object
        400:
          description: error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
      - activation
      summary: Abort the activation process
      description: Aborts a running activation process
      operationId: cancelActivation
      parameters:
      - name: id
        in: path
        description: Activation process ID
        required: true
        schema:
          type: string
      responses:
        204:
          description: Activation process successfully aborted
          content: {}
        400:
          description: error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
  /digipass/activation/{id}/instance:
    post:
      tags:
      - activation
      summary: Create instance
      description: Creates a new instance during the activation process of a new Digipass
        instance
      operationId: createInstance
      parameters:
      - name: id
        in: path
        description: Activation process ID
        required: true
        schema:
          type: string
      requestBody:
        description: Request parameters
        content:
          'application/json':
            schema:
              required:
              - deviceCode
              - deviceData
              type: object
              properties:
                deviceCode:
                  type: string
                  description: Device-specific code
                deviceData:
                  $ref: '#/components/schemas/DeviceData'
        required: true
      responses:
        200:
          description: Instance activation response
          content:
            'application/json':
              schema:
                type: object
        400:
          description: error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: request
  /digipass/activation/{id}/instance/{instance}:
    post:
      tags:
      - activation
      summary: Finish instance creation
      description: Finishes the instance creation with a post-activation verification
        message
      operationId: postActivate
      parameters:
      - name: id
        in: path
        description: Activation process ID
        required: true
        schema:
          type: string
      - name: instance
        in: path
        description: Instance sequence number
        required: true
        schema:
          type: string
      requestBody:
        description: Request parameters
        content:
          'application/json':
            schema:
              required:
              - otp
              type: object
              properties:
                otp:
                  type: string
                  description: Initial verification OTP
                pushNotificationId:
                  type: string
                  description: Push notification identifier
        required: true
      responses:
        200:
          description: Post-activation response
          content:
            'application/json':
              schema:
                type: object
        400:
          description: error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: request
      
  /asymtokenactivation:
    post:
      tags:
        - asym token activation
      summary: Initiation of activation - first phase
      description: Initiation of activation by token, verification of activation OTP
      operationId: InitiateActivation
      requestBody:
        description: InitiateActivationRequest
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateActivationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateActivationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtokenactivation/{processGuid}:
    post:
      tags:
        - asym token activation
      summary: Completion of activation - second phase
      description: Completion of activation by token, instance created
      operationId: ProcessActivationStep
      parameters:
        - name: processGuid
          description: Guid of activation process
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: ProcessActivationStepRequest
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessActivationStepRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessActivationStepResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtokenactivation/migration/init:
    post:
      tags:
        - asym token activation 
      summary: Initiation of migration 
      description: Initiation of migration
      operationId: InitiateMigration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitMigrationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtokenactivation/migration/finish:
    post:
      tags:
        - asym token activation
      summary: Finish of migration
      description: Finish of migration
      operationId: FinishMigration
      requestBody:
        description: FinishMigrationRequest
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishMigrationRequest'
      responses:
        '200':
          description: OK
          content: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtokenactivation/replacement:
    post:
      tags:
        - asym token activation
      summary: Device replacement
      description: Request to eCobra token instance replacement
      operationId: DeviceReplacement
      requestBody:
        description: DeviceReplacementRequest
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceReplacementRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceReplacementResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/device/{instanceId}:
    get:
      tags:
        - asym token 
      summary: Asym token information
      description: information about instance and license
      operationId: GetDeviceInformation
      parameters:
        - name: instanceId
          description: Instance serial number
          in: path
          required: true
          schema:
            type: string
        - name: userName
          description: User name 
          in: query
          required: true
          schema:
            type: string
        - name: request
          description: Encrypted request
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsymTokenInfoResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/device/{instanceId}/block:
    post:
      tags:
        - asym token
      summary: Block asym token instance
      description: Block asym token instance
      operationId: BlockInstance
      parameters:
        - name: instanceId
          description: Instance serial number
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Body
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/DeviceBlockRequest'
        required: true
      responses:
        '200':
          description: OK
          content: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/device/{instanceId}/operations:
    get:
      tags:
        - asym token
      summary: Get pending operations 
      description: Get pending operations to sign
      operationId: GetPendingOperations
      parameters:
        - name: instanceId
          description: Instance serial number
          in: path
          required: true
          schema:
            type: string
        - name: request
          description: Encrypted request
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AsymTokenPendingOperation'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/device/{instanceId}/sign:
    post:
      tags:
        - asym token
      summary: Sign pending operation
      description: Sign pending operation
      operationId: SignPendingOperation
      parameters:
        - name: instanceId
          description: Instance serial number
          in: path
          required: true
          schema:
            type: string
        - name: request
          description: Encrypted request
          in: query
          required: true
          schema:
            type: string
      requestBody:
        description: Body
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/AsymTokenSignBody'
        required: true
      responses:
        '200':
          description: OK
          content: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/device/{instanceId}/reject:
    post:
      tags:
        - asym token
      summary: Reject pending operation
      description: Reject pending operation
      operationId: RejectPendingOperation
      parameters:
        - name: instanceId
          description: Instance serial number
          in: path
          required: true
          schema:
            type: string
        - name: request
          description: Encrypted request
          in: query
          required: true
          schema:
            type: string
      requestBody:
        description: Body
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/AsymTokenRejectBody'
        required: true
      responses:
        '200':
          description: OK
          content: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/dictionary:
    get:
      tags:
        - asym token 
      description: Information about the current version of the dictionary
      operationId: GetLatestDictionaryVersionInfo
      summary: Asym token latest dictionary version
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLatestDictionaryVersionInfoResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /asymtoken/dictionary/{version}:
    get:
      tags:
        - asym token
      summary: Asym token dictionary
      description: WYSIWYS dictionary
      operationId: GetAsymTokenDictionary
      parameters:
        - name: version
          description: Dictionary version
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictionaryVersion'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /login:
    get:
      tags:
      - login
      summary: Login challenge
      description: Get login challenge
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      - name: userName
        in: query
        description: User name (same as in internet banking)
        required: true
        schema:
          type: string
      - name: appVersion
        in: query
        description: Version of the mobile application (1.2.3)
        schema:
          type: string
      - name: platform
        in: query
        description: Platform of the mobile application
        schema:
          type: string
          enum:
          - UNKNOWN
          - ANDROID
          - IOS
      - name: instanceSerialNumber
        in: query
        description: Instance serial number (required for login by asym token)
        schema:
          type: string
      - name: asymTokenRequest
        in: query
        description: Encrypted request 
        schema:
          type: string
      responses:
        200:
          description: Challenge
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Challenge'
        400:
          description: Bad Request
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
      - login
      summary: Login user
      description: Login user
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      - name: asymTokenRequest
        in: query
        description: Encrypted request 
        schema:
          type: string
      requestBody:
        description: Data required for the autentication of the user
        content:
          'application/json':
            schema:
              required:
              - code
              - instanceSerialNumber
              - signId
              - userName
              type: object
              properties:
                userName:
                  type: string
                  description: User name (same as in internet banking)
                code:
                  type: string
                  description: Code generated by the embedded token
                signId:
                  type: string
                  description: Unique transaction ID from challenge
                  example: BAE19DD3-BE16-4DAD-BAD1-BEEE4D6C4B96
                instanceSerialNumber:
                  type: string
                  description: Serial number of the autentication device instance
                additionalData:  
                  type: string
                  description: Additional data of the asym token instance
        required: true
      responses:
        200:
          description: Access token
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Token'
        400:
          description: Bad Request
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Forbidden
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: body
  /logout:
    post:
      tags:
      - login
      summary: Logout user
      description: Logout user
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      responses:
        200:
          description: User was succesfully logged out
          content: {}
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
  /user:
    get:
      tags:
      - user
      summary: Get basic information about the user
      description: Get basic information about the user.
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      responses:
        200:
          description: User info
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - Bearer: []
  /user/preferences:
    put:
      tags:
      - user
      summary: Update user preferences
      description: Update user preferences
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      requestBody:
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/UserPreferences'
        required: false
      responses:
        200:
          description: Empty response
          content: {}
        400:
          description: Bad Request
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - Bearer: []
      x-codegen-request-body-name: preferences
  /client:
    get:
      tags:
      - client
      summary: Get client list
      description: Get list of all clients
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      responses:
        200:
          description: Output data structure
          content:
            'application/json':
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - Bearer: []
  /client/info:
    post:
      tags:
      - client
      summary: Set client context and get client info
      description: Set client context and get client info
      parameters:
      - name: Accept-Language
        in: header
        description: Language preffered by API consumer (en, cs, sk)
        schema:
          type: string
      requestBody:
        description: Input data structure
        content:
          'application/json':
            schema:
              required:
              - id
              type: object
              properties:
                id:
                  type: integer
                  description: The unique identifier of the selected client
                  format: int64
                  example: 1234567890
        required: true
      responses:
        200:
          description: Output data structure
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ClientInfo'
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Not Found
          content: {}
        500:
          description: Server Error
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Error'
      security:
