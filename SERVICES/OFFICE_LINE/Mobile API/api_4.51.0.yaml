        - PERMANENT
        - TEMPORARY
        - COURIER
    IpLimitRequest:
      type: object
      required:
        - userId
        - limitType
      properties:
        userId:
          type: number
          format: int64
          description: Unique identifier of the user (disponent)
        limitType:
          $ref: '#/components/schemas/IpLimitType'
        limitValue:
          type: number
          example: 1000.00
          description: Set to null if limitType is NOT_SET
    IpLimit:
      type: object
      required:
        - userId
        - userName
        - name
        - limitType
      properties:
        userId:
          type: number
          format: int64
          description: Unique identifier of the user (disponent)
        userName:
          type: string
          description: User name (login name) 
        name:
          type: string
          description: User's last name and first name
        limitType:
          $ref: '#/components/schemas/IpLimitType'
        limitValue:
          type: number
          example: 1000.00
    IpLimitType:
      type: string
      enum:
        - NOT_SET
        - SIMPLE
        - DAILY
    IpLimitsOverview:
      type: object
      required:
        - ipLimits
        - maxSimpleLimit
        - maxDailyLimit
        - currency
      properties:
        ipLimits:
          type: array
          items:
            $ref: '#/components/schemas/IpLimit'
        maxSimpleLimit:
          type: number
          example: 10000.00
        maxDailyLimit:
          type: number
          example: 100000.00
        currency:
          type: string
          description: Limits currency
          example: EUR
    ClientExamsResponse:
      type: object
      required:
        - clientExamsNew
        - clientExamsPerformed
      properties:
        clientExamsNew:
          type: array
          items:
            $ref: '#/components/schemas/ClientExamNew'
        clientExamsPerformed:
          type: array
          items:
            $ref: '#/components/schemas/ClientExamPerformed'
    ClientExamNew:
      type: object
      required:
        - clientExamId
        - name
      properties:
        clientExamId:
          type: number
          format: int32
          description: Client exam identifier
        name:
          type: string
          description: Client exam name
    ClientExamPerformed:
      type: object
      required:
        - clientExamId
        - name
        - validTill
        - isPassed
      properties:
        clientExamId:
          type: number
          format: int32
          description: Client exam identifier
        name:
          type: string
          description: Client exam name
        validTill:
          type: string
          description: Valid till
          format: date
          example: 2025-01-01
        countOfDaysToWait:
          type: number
          format: int32
          description: Count of days to wait
        isPassed:
          type: boolean
          description: Client exam is passed
    ClientExamResponse:
      type: object
      required:
        - id
        - clientExam
      properties:
        id:
          type: number
          format: int64
          description: Unique identifier of the order
        clientExam:
          $ref: '#/components/schemas/ClientExam'
    ClientExam:
      type: object
      required:
        - clientExamId
        - name
        - language
      properties:
        clientExamId:
          type: number
          format: int32
          description: Client exam identifier
        name:
          type: string
          description: Client exam name
        isPassed:
          type: boolean
          description: Client exam is passed
        language:
          $ref: '#/components/schemas/LanguageType'
        performedOn:
          type: string
          description: Performed on
          format: date
          example: 2025-01-01
        questionList:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        mxQuestionList:
          type: array
          items:
            $ref: '#/components/schemas/MxQuestion'
    LanguageType:
      type: string
      enum:
        - SLOVAK
        - CZECH
        - ENGLISH
    Question:
      type: object
      required:
        - id
        - position
        - text
        - isMultipleChoice
      properties:
        id:
          type: number
          format: int32
          description: Question identifier
        position:
          type: number
          format: int32
          description: Position
        text:
          type: string
          description: Text
        isMultipleChoice:
          type: boolean
          description: Is multiple choice
        image:
          type: string
          format: byte
          description: Image bytes
        answerList:
          type: array
          items:
            $ref: '#/components/schemas/Answer'
    Answer:
      type: object
      required:
        - id
      properties:
        id:
          type: number
          format: int32
          description: Question identifier
        isMarked:
          type: boolean
          description: Is marked
        text:
          type: string
          description: Text
    MxQuestion:
      type: object
      required:
        - id
        - position
        - title
        - generalQuestionText
        - columnList
        - rowList
      properties:
        id:
          type: number
          format: int32
          description: Question identifier
        position:
          type: number
          format: int32
          description: Position
        title:
          type: string
          description: Title
        generalQuestionText:
          type: string
          description: General question text
        generalAnswerText:
          type: string
          description: General answer text
        generalAnswerChecked:
          type: boolean
          description: General answer checked
        columnList:
          type: array
          items:
            $ref: '#/components/schemas/MxQuestionColumn'
        rowList:
          type: array
          items:
            $ref: '#/components/schemas/MxQuestionRow'
    MxQuestionColumn:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: number
          format: int32
          description: Question identifier
        title:
          type: string
          description: Title
        subtitle:
          type: string
          description: Subtitle
    MxQuestionRow:
      type: object
      required:
        - id
        - text
        - cells
      properties:
        id:
          type: number
          format: int32
          description: Question identifier
        text:
          type: string
          description: Text
        cells:
          type: array
          items:
            $ref: '#/components/schemas/MxQuestionCell'
    MxQuestionCell:
      type: object
      required:
        - id
        - position
        - rowId
        - isMarked
      properties:
        id:
          type: number
          format: int32
          description: Question identifier
        position:
          type: number
          format: int32
          description: Position
        rowId:
          type: number
          format: int32
          description: Row identifier
        isMarked:
          type: boolean
          description: Is marked
    VopRequest:
      type: object
      required:
        - clientId
        - iban
        - bic
        - payeeName
      properties:
        clientId:
          type: number
          format: int64
          description: Unique identifier of the client
        iban:
          type: string
          description: Payee IBAN
        bic:
          type: string
          description: Payee BIC
        payeeName:
          type: string
          description: Payee name
    VopResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: VOP result message in required language
  securitySchemes:
    Bearer:
      type: apiKey
      name: Authorization
      in: header
