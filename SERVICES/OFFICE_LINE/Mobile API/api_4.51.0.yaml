components:
  schemas:
    Product:
      required:
      - creationDate
      - id
      - name
      - owner
      type: object
      properties:
        id:
          type: integer
          description: The unique identifier for the product
          format: int64
          example: 1234567890
        name:
          maxLength: 100
          type: string
          description: The name for the product
          example: Muj ucet
        owner:
          maxLength: 100
          type: string
          description: Owner of the product
          example: Jan Novak
        creationDate:
          type: string
          description: The date at which the account has been opened
          format: date
          example: 2010-01-20
    ProductAccessibility:
      type: string
      enum:
      - HIDDEN
      - PASSIVE_ONLY
      - ACTIVE_OPERATIONS_FOR_SIGNATURE
      - ACTIVE
    Client:
      type: object
      properties:
        id:
          type: integer
          description: The unique identifier of the client record
          format: int64
          example: 1234567890
        name:
          maxLength: 100
          type: string
          description: Name of the client
          example: Jan Novak
    ClientInfo:
      type: object
      properties:
        id:
          type: integer
          description: The unique identifier of the client record
          format: int64
          example: 1234567890
        name:
          maxLength: 100
          type: string
          description: Name of the client
          example: Jan Novak
        productAccessList:
          type: array
          description: List of the access right to products
          items:
            $ref: '#/components/schemas/ProductAccess'
        actions:
          type: array
          description: List of the available actions for this product
          items:
            $ref: '#/components/schemas/ProductAction'
        clientType:
          type: string
          description: Type of the client
          enum:
          - UNKNOWN
          - FO
          - PO
          - FOP
        isMasterUser:
          type: boolean
          description: Flag indicating whether the logged user is master user of this
            client
          example: true
    BankerInfo:
      type: object
      properties:
        name:
          type: string
          description: Name of the banker
          example: Jan Novak
        phone:
          type: string
          description: Phone number
          example: +421902111222
        recordedPhone:
          type: string
          description: Recorded phone number
          example: +421902111222
        email:
          type: string
          description: Email address
          example: email@email.em
        photo:
          type: string
          format: binary
          description: Photo
    ProductAccess:
      type: object
      properties:
        productId:
          type: integer
          description: The unique identifier of the product record
          format: int64
        access:
          $ref: '#/components/schemas/ProductAccessibility'
    AccountCurrent:
      allOf:
      - $ref: '#/components/schemas/Product'
      - required:
        - availableBalance
        - availableBalanceInRefCurr
        - currency
        - currentBalance
        - currentBalanceInRefCurr
        - iban
        - ownFunds
        - ownFundsInRefCurr
        - refCurrency
        type: object
        properties:
          iban:
            maxLength: 42
            type: string
            description: IBAN (International Bank Account Number)
            example: SK5181200000001111111111
          currency:
            maxLength: 3
            minLength: 3
            type: string
            description: The account's currency code in ISO 4217 format (CZK, EUR,
              USD, ...)
            example: EUR
          currentBalance:
            type: number
            description: The current account balance (may not include transactions
              yet to be posted to the account often as of previous business day)
            example: 104804.91
          availableBalance:
            type: number
            description: The available balance in the account (may include pending
              transactions and overdraft limit)
            example: 104804.91
          ownFunds:
            type: number
            description: The available balance in the account without the overdraft
              limit
            example: 104804.91
          currentBalanceInRefCurr:
            type: number
            description: The current account balance in reference currency (may not
              include transactions yet to be posted to the account often as of previous
              business day)
            example: 104804.91
          availableBalanceInRefCurr:
            type: number
            description: The available balance in the account in reference currency
              (may include pending transactions and overdraft limit)
            example: 104804.91
          ownFundsInRefCurr:
            type: number
            description: The available balance in the account without the overdraft
              limit in reference currency
            example: 104804.91
          refCurrency:
            maxLength: 3
            minLength: 3
            type: string
            description: The reference currency code in ISO 4217 format (EUR)
            example: EUR
          parentAccount:
            maxLength: 42
            type: string
            description: The parent account (IBAN)
            example: SK5181200000001111111111
          allowPaymentCardRequest:
            type: boolean
            description: Is it allowed to issue a payment card to this account?
    AccountCredit:
      allOf:
      - $ref: '#/components/schemas/Product'
      - required:
        - currency
        - currentBalance
        - currentBalanceInRefCurr
        - iban
        - interestRate
        - limit
        - refCurrency
        type: object
        properties:
          iban:
            maxLength: 42
            type: string
            description: IBAN (International Bank Account Number)
            example: SK5181200000001111111111
          currency:
            maxLength: 3
            minLength: 3
            type: string
            description: The account's currency code in ISO 4217 format (CZK, EUR,
              USD, ...)
            example: EUR
          currentBalance:
            type: number
            description: The current account balance
            example: 104804.91
          interestRate:
            type: number
            description: Interest rate of the credit account
            example: 0.02
          limit:
            type: number
            description: Limit of the current account
            example: 200000.0
          currentBalanceInRefCurr:
            type: number
            description: The current account balance in reference currency (may not
              include transactions yet to be posted to the account often as of previous
              business day)
            example: 104804.91
          refCurrency:
            maxLength: 3
            minLength: 3
            type: string
            description: The reference currency code in ISO 4217 format (EUR)
            example: EUR
          parentAccount:
            maxLength: 42
            type: string
            description: The parent account (IBAN)
            example: SK5181200000001111111111
    AccountTerm:
      allOf:
      - $ref: '#/components/schemas/Product'
      - required:
        - autoProlonged
        - currency
        - currentBalance
        - currentBalanceInRefCurr
        - iban
        - interestRate
        - maturityDate
